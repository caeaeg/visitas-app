<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #fafafa;
    }

    h2 {
      text-align: center;
    }

    input, button, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 10px;
    }

    .primary {
      background: #2196F3;
      color: white;
    }

    .secondary {
      background: #555;
      color: white;
    }

    .card {
      background: white;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .hidden {
      display: none;
    }

    .backBtn {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #ddd;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .full {
      grid-column: span 2;
    }

    .mini {
      font-size: 13px;
      color: gray;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      display: inline-block;
      margin-top: 5px;
    }

    .pendiente { background: orange; color: white; }
    .resuelto { background: green; color: white; }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🔒 Acceso Administrador</h2>
  <input id="clave" type="password" placeholder="Clave numérica">
  <button class="primary" onclick="verificar()">Entrar</button>
  <button class="secondary" onclick="volver()">⬅ Volver</button>
</div>

<!-- MENÚ -->
<div id="menu" class="hidden">

  <button class="backBtn" onclick="volver()">⬅</button>

  <h2>📊 Menú Administrador</h2>

  <div class="grid">

    <button onclick="abrirSeccion('historial')" class="primary">
      📊 Historial
    </button>

    <button onclick="abrirSeccion('territorio')" class="primary">
      🗺 Por territorio
    </button>

    <button onclick="abrirSeccion('lista')" class="secondary">
      🏢 Listado
    </button>

    <button onclick="abrirSeccion('editar')" class="secondary">
      ✏ Editar
    </button>

    <button onclick="abrirSeccion('problemas')" class="primary full">
      ⚠ Solución de problemas
    </button>

  </div>

</div>

<!-- HISTORIAL -->
<div id="historial" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>Historial</h2>

  <input id="dir" placeholder="Dirección">
  <button class="primary" onclick="cargar()">Ver historial</button>

  <div id="resultado"></div>

</div>

<!-- TERRITORIO -->
<div id="territorio" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>Buscar por territorio</h2>

  <input id="territorioInput" placeholder="Número de territorio">
  <button class="primary" onclick="buscarTerritorio()">Buscar</button>

  <div id="listaTerritorio"></div>

</div>

<!-- LISTADO -->
<div id="lista" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>Listado de edificios</h2>

  <select onchange="ordenar(this.value)">
    <option value="">Ordenar...</option>
    <option value="territory">Por territorio</option>
    <option value="recent">Recientes</option>
    <option value="most">Más trabajados</option>
  </select>

  <button class="primary" onclick="cargarEdificios()">Cargar</button>

  <div id="listaEdificios"></div>

</div>

<!-- EDITAR -->
<div id="editar" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>Editar edificio</h2>

  <input id="buscarEdit" placeholder="Dirección o territorio">
  <button class="primary" onclick="buscarParaEditar()">Buscar</button>

  <div id="resultadoEdit"></div>

  <div id="formEdit" class="hidden">

    <h3>Datos del edificio</h3>

    <input id="edit_address" placeholder="Dirección">
    <input id="edit_address2" placeholder="Dirección 2">
    <input id="edit_name" placeholder="Nombre">
    <input id="edit_territory" placeholder="Territorio">

    <input id="edit_floors" type="number" placeholder="Pisos">
    <input id="edit_units" type="number" placeholder="Deptos por piso">

    <label><input type="checkbox" id="edit_pb"> Planta baja</label>
    <label><input type="checkbox" id="edit_portero"> Portero</label>

    <textarea id="edit_description" placeholder="Descripción"></textarea>

    <button class="primary" onclick="guardarEdificio()">💾 Guardar</button>
    <button class="secondary" onclick="cancelarEdicion()">Cancelar</button>

    <p id="msgEdit" class="mini"></p>

  </div>

</div>

<!-- PROBLEMAS -->
<div id="problemas" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>Problemas reportados</h2>

  <button class="primary" onclick="cargarIssues()">Ver reportes</button>

  <div id="listaIssues"></div>

</div>


<script>

const CLAVE = "2414";
let ordenActual = "";
let buildingEditId = null;

// LOGIN
function verificar() {
  const input = document.getElementById("clave").value;

  if (input === CLAVE) {
    document.getElementById("login").style.display = "none";
    document.getElementById("menu").style.display = "block";
  } else {
    alert("Clave incorrecta");
  }
}

function volver() {
  window.location.href = "/";
}

// NAV
function abrirSeccion(id) {
  document.getElementById("menu").style.display = "none";

  document.querySelectorAll("body > div").forEach(d => {
    if (d.id !== "login" && d.id !== "menu") {
      d.style.display = "none";
    }
  });

  document.getElementById(id).style.display = "block";
}

function volverMenu() {
  document.querySelectorAll("body > div").forEach(d => {
    if (d.id !== "login") d.style.display = "none";
  });

  document.getElementById("menu").style.display = "block";
}

// HISTORIAL
async function cargar() {
  const input = document.getElementById("dir").value;
  if (!input) return alert("Ingresá dirección");

  const b = await fetch(`/building/${encodeURIComponent(input)}`);
  const building = await b.json();

  if (!building._id) return alert("No existe");

  const res = await fetch(`/history/${building._id}`);
  const data = await res.json();

  let html = `
    <div class="card">
      Total: ${data.total}<br>
      Atendidos: ${data.atendidos}<br>
      Progreso: ${data.progreso}%
    </div>
  `;

  data.detalle.forEach(d => {
    html += `
      <div class="card">
        <b>${d.number}</b><br>
        ${d.lastStatus || "Nunca"}
      </div>
    `;
  });

  document.getElementById("resultado").innerHTML = html;
}

// TERRITORIO
async function buscarTerritorio() {
  const t = document.getElementById("territorioInput").value;

  const res = await fetch(`/territory/${t}`);
  const data = await res.json();

  let html = "";

  data.forEach(b => {
    html += `
      <div class="card">
        <b>${b.address}</b><br>
        <span class="mini">${b.name || ""}</span>
      </div>
    `;
  });

  document.getElementById("listaTerritorio").innerHTML = html;
}

// LISTADO
async function cargarEdificios() {
  const res = await fetch(`/admin/buildings?sort=${ordenActual}`);
  const data = await res.json();

  let html = "";

  data.forEach(b => {
    html += `
      <div class="card">
        <b>${b.address}</b><br>
        🗺 ${b.territory || "-"}<br>
        🔁 ${b.totalVisits} visitas
      </div>
    `;
  });

  document.getElementById("listaEdificios").innerHTML = html;
}

function ordenar(v) {
  ordenActual = v;
}

// EDITAR
async function buscarParaEditar() {

  const q = document.getElementById("buscarEdit").value.trim();
  if (!q) return alert("Escribí algo");

  const cont = document.getElementById("resultadoEdit");
  cont.innerHTML = "Buscando...";

  const b = await fetch(`/building/${encodeURIComponent(q)}`);
  const building = await b.json();

  if (building._id) return mostrarFormulario(building);

  const res = await fetch(`/territory/${q}`);
  const lista = await res.json();

  cont.innerHTML = "";

  lista.forEach(b => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = b.address;
    div.onclick = () => mostrarFormulario(b);
    cont.appendChild(div);
  });
}

function mostrarFormulario(b) {

  buildingEditId = b._id;
  document.getElementById("formEdit").style.display = "block";

  document.getElementById("edit_address").value = b.address || "";
  document.getElementById("edit_address2").value = b.address2 || "";
  document.getElementById("edit_name").value = b.name || "";
  document.getElementById("edit_territory").value = b.territory || "";
  document.getElementById("edit_floors").value = b.floors || "";
  document.getElementById("edit_units").value = b.unitsPerFloor || "";

  document.getElementById("edit_pb").checked = b.hasGroundFloor || false;
  document.getElementById("edit_portero").checked = b.hasDoorman || false;

  document.getElementById("edit_description").value = b.description || "";
}

async function guardarEdificio() {

  const msg = document.getElementById("msgEdit");

  const address = document.getElementById("edit_address").value.trim();
  const floors = Number(document.getElementById("edit_floors").value);
  const units = Number(document.getElementById("edit_units").value);

  if (!address) return msg.innerText = "Dirección obligatoria";
  if (floors <= 0) return msg.innerText = "Pisos inválidos";
  if (units <= 0) return msg.innerText = "Unidades inválidas";

  msg.innerText = "Guardando...";

  await fetch(`/building/${buildingEditId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      address,
      address2: document.getElementById("edit_address2").value,
      name: document.getElementById("edit_name").value,
      territory: document.getElementById("edit_territory").value,
      floors,
      unitsPerFloor: units,
      hasGroundFloor: document.getElementById("edit_pb").checked,
      hasDoorman: document.getElementById("edit_portero").checked,
      description: document.getElementById("edit_description").value
    })
  });

  msg.innerText = "✅ Guardado";

  setTimeout(() => {
    cancelarEdicion();
    msg.innerText = "";
  }, 1200);
}

function cancelarEdicion() {
  document.getElementById("formEdit").style.display = "none";
  buildingEditId = null;
}

// PROBLEMAS
async function cargarIssues() {

  const res = await fetch("/issues");
  const data = await res.json();

  let html = "";

  if (!data.length) {
    html = "<p>No hay problemas reportados</p>";
  }

  data.forEach(i => {

    html += `
      <div class="card">
        <b>${i.type}</b><br>
        📍 ${i.buildingId?.address || "-"}<br>
        📝 ${i.description || "-"}<br>
        🕒 ${new Date(i.createdAt).toLocaleDateString()}<br>

        <b>Estado:</b> ${i.status}<br><br>

        <button onclick="cambiarEstado('${i._id}','EN_PROCESO')" class="secondary">
          En proceso
        </button>

        <button onclick="cambiarEstado('${i._id}','RESUELTO')" class="primary">
          Resolver
        </button>
      </div>
    `;
  });

  document.getElementById("listaIssues").innerHTML = html;
}

async function cambiarEstado(id, estado) {

  await fetch(`/issues/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: estado })
  });

  cargarIssues();
}

</script>

</body>
</html>
