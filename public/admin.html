<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #fafafa;
    }

    h2 {
      text-align: center;
    }

    input, button, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 10px;
    }

    .primary {
      background: #2196F3;
      color: white;
    }

    .secondary {
      background: #555;
      color: white;
    }

    .card {
      background: white;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .hidden {
      display: none;
    }

    .backBtn {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #ddd;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }
    .gridBuildings {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.cardBuilding {
  background: white;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 0 6px rgba(0,0,0,0.1);
  cursor: pointer;
}

.cardBuilding b {
  font-size: 16px;
}

.small {
  font-size: 13px;
  color: gray;
}

    .full {
      grid-column: span 2;
    }

    .mini {
      font-size: 13px;
      color: gray;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      display: inline-block;
      margin-top: 5px;
    }

    .pendiente { background: orange; color: white; }
    .resuelto { background: green; color: white; }

    .barra {
  width: 100%;
  height: 8px;
  background: #ddd;
  border-radius: 5px;
  margin: 5px 0;
  overflow: hidden;
}

.barra div {
  height: 100%;
  background: #4CAF50;
  width: 0%;
}

.barra.rojo div {
  background: #f44336;
}

.barra div {
  height: 100%;
  width: 0%;
  transition: width 1.2s ease-in-out;
}

.card {
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
    
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🔒 Acceso Administrador</h2>
  <input id="clave" type="password" placeholder="Clave numérica">
  <button class="primary" onclick="verificar()">Entrar</button>
  <button class="secondary" onclick="volver()">⬅ Volver</button>
</div>
  

<!-- MENÚ -->
<div id="menu" class="hidden">

  <button class="backBtn" onclick="volver()">⬅</button>

  <h2>📊 Menú Administrador</h2>

  <div class="grid">

    <button onclick="abrirSeccion('historial')" class="primary">
      📊 Historial
    </button>

    <button onclick="abrirSeccion('territorio')" class="primary">
      🗺 Por territorio
    </button>

    <button onclick="abrirSeccion('lista')" class="secondary">
      🏢 Listado
    </button>

    <button onclick="abrirSeccion('editar')" class="secondary">
      ✏ Editar
    </button>

    <button onclick="abrirSeccion('problemas')" class="primary full">
      ⚠ Solución de problemas
    </button>

  </div>

</div>

<!-- HISTORIAL -->
<div id="historial" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>
  Historial
  <button onclick="editarActual()" style="float:right;">✏️</button>
</h2>

  <input id="dir" placeholder="Dirección">
  <button class="primary" onclick="cargar()">Ver historial</button>

  <div id="resultado"></div>

</div>

<!-- TERRITORIO -->

<div id="territorio" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>Territorio</h2>

  <!-- 📊 DASHBOARD -->
  <div id="dashboard" style="margin-bottom:15px;">
    <div class="grid">

      <div class="card">
        <b>🏢 Total edificios</b><br>
        <span id="totalEdificios">-</span>
      </div>

      <div class="card">
        <b>✅ Visitados</b><br>
        <span id="visitados">-</span>
      </div>

      <div class="card">
        <b>🚪 Atendió</b>
        <div class="barra"><div id="barAtendio"></div></div>
        <span id="porcAtendio">-</span>
      </div>

      <div class="card">
        <b>❌ No en casa</b>
        <div class="barra rojo"><div id="barNo"></div></div>
        <span id="porcNo">-</span>
      </div>

      <div class="card full">
        <b>🕳 No visitados</b><br>
        <span id="noVisitados">-</span>
      </div>

    </div>
  </div>

  <!-- 🗺 MAPA -->
  <div id="mapaContainer" style="margin-top:10px;">
    <iframe 
      src="https://www.google.com/maps/d/embed?mid=1lhh_CmzfSr-WrY3MbyNQ19sKgKBiGUU&ehbc=2E312F&noprof=1"
      width="100%" 
      height="400"
      style="border:0; border-radius:10px;">
    </iframe>
  </div>

  <!-- 🔎 BUSCADOR -->
  <h3 style="margin-top:15px;">Buscar edificios</h3>

  <input id="territorioInput" placeholder="Número de territorio">
  <button class="primary" onclick="buscarTerritorio()">Buscar</button>

  <!-- 📋 RESULTADOS -->
  <div id="listaTerritorio"></div>

</div>

<!-- LISTADO -->
<div id="lista" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>Listado de edificios</h2>

<select onchange="ordenar(this.value)">
  <option value="">Ordenar...</option>
  <option value="all">Mostrar todos</option>
  <option value="territory">Por territorio</option>
  <option value="recent">Recientes</option>
  <option value="most">Más trabajados</option>
</select>

  <button class="primary" onclick="cargarEdificios()">Cargar</button>

  <div id="listaEdificios"></div>

</div>

<!-- EDITAR -->
<div id="editar" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2 id="tituloForm">Agregar / Editar edificio</h2>
<p id="modoForm" class="mini"></p>

  <input id="buscarEdit" placeholder="Dirección o territorio">
  <button class="primary" onclick="buscarParaEditar()">Buscar</button>

  <div id="resultadoEdit"></div>

  <div id="formEdit" class="hidden">

    <h3>Datos del edificio</h3>

    <input id="edit_address" placeholder="Dirección"
oninput="this.value = this.value.replace(/[^a-zA-Z0-9 ]/g, '')">
    <input id="edit_address2" placeholder="Dirección 2">
    <input id="edit_name" placeholder="Nombre">
    <input id="edit_territory" placeholder="Territorio"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">

    <input id="edit_floors" type="number" placeholder="Pisos"
      oninput="this.value = this.value.replace(/[^a-zA-Z0-9 ]/g, '')">
    <input id="edit_units" type="number" placeholder="Deptos por piso"
      oninput="this.value = this.value.replace(/[^a-zA-Z0-9 ]/g, '')">

    <label><input type="checkbox" id="edit_pb"> Planta baja</label>
    <label><input type="checkbox" id="edit_portero"> Portero</label>

    <textarea id="edit_description" placeholder="Descripción"></textarea>

    <button class="primary" onclick="guardarEdificio()">💾 Guardar</button>
    <button class="secondary" onclick="cancelarEdicion()">Cancelar</button>

    <p id="msgEdit" class="mini"></p>

  </div>

</div>

<!-- PROBLEMAS -->
<div id="problemas" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>Problemas reportados</h2>

  <button class="primary" onclick="cargarIssues()">Ver reportes</button>

  <div id="listaIssues"></div>

</div>

 <!-- DETALLE EDIFICIO -->
<div id="detalleEdificio" class="hidden">

  <button class="backBtn" onclick="volverMenu()">⬅</button>

  <h2>Detalle del edificio</h2>

  <div id="detalleContenido"></div>

</div>
   
<script>

const CLAVE = "2414";
let ordenActual = "";
let buildingEditId = null;
let modoSoloCrear = false;
// LOGIN
function verificar() {
  const input = document.getElementById("clave").value;

  if (input === CLAVE) {
    document.getElementById("login").style.display = "none";
    document.getElementById("menu").style.display = "block";
  } else {
    alert("Clave incorrecta");
  }
}
let paginaActual = 1;
let totalPaginas = 1;
  
function volver() {
  window.location.href = "/";
}

function editarActual() {

  if (!currentBuildingHist) return;

  abrirSeccion("editar");

  setTimeout(() => {
    mostrarFormulario(currentBuildingHist);
  }, 100);
}  

  //DASHBOARD
async function cargarDashboard() {

  const res = await fetch("/stats");
  const data = await res.json();

  totalEdificios.innerText = data.totalEdificios;
  visitados.innerText = data.visitados;

  const total = data.totalVisitas || 1;

  const porcA = Math.round((data.atendio / total) * 100);
  const porcN = Math.round((data.noCasa / total) * 100);

  porcAtendio.innerText = porcA + "%";
  porcNo.innerText = porcN + "%";

  barAtendio.style.width = porcA + "%";
  barNo.style.width = porcN + "%";

  noVisitados.innerText =
    data.totalEdificios - data.visitados;
}
  
setTimeout(() => {
  barAtendio.style.width = porcA + "%";
  barNo.style.width = porcN + "%";
}, 200);
  
function volverMenu() {

  if (modoSoloCrear) {
    window.location.href = "/";
    return;
  }

  document.querySelectorAll("body > div").forEach(d => {
    if (d.id !== "login") d.style.display = "none";
  });

  document.getElementById("menu").style.display = "block";
}

// HISTORIAL
let currentBuildingHist = null;

async function cargar() {

  const input = document.getElementById("dir").value;
  if (!input) return alert("Ingresá dirección");

  // 🔹 buscar edificio
  const b = await fetch(`/building/${encodeURIComponent(input)}`);
  const building = await b.json();

  if (!building._id) return alert("No existe");

  currentBuildingHist = building; // 👈 guardamos para editar

  // 🔹 historial
  const res = await fetch(`/history/${building._id}`);
  const data = await res.json();

  // 🔹 problemas
  const issuesRes = await fetch(`/issues?status=PENDIENTE`);
  const issues = await issuesRes.json();

  const issuesDelEdificio = issues.filter(i =>
    i.buildingId?._id === building._id
  );

  let html = "";

  // 🔥 PROBLEMAS ARRIBA
  if (issuesDelEdificio.length) {
    html += `
      <div class="card" style="border-left:5px solid red;">
        <b>⚠ Problemas reportados:</b><br>
        ${issuesDelEdificio.map(i =>
          `• ${i.description || i.type}`
        ).join("<br>")}
      </div>
    `;
  }

  // 🔹 resumen
  html += `
    <div class="card">
      Total: ${data.total}<br>
      Atendidos: ${data.atendidos}<br>
      Progreso: ${data.progreso}%
    </div>
  `;
  html += `
  ${building.description ? `
    <div class="card">
      📝 ${building.description}
    </div>
  ` : ""}
`;

  // 🔹 detalle departamentos
  data.detalle.forEach(d => {

    html += `
      <div class="card">
        <b>${d.number}</b><br>
        Estado: ${d.lastStatus || "Nunca"}<br>

        ${
          d.lastDate
            ? `📅 ${new Date(d.lastDate).toLocaleDateString()}<br>`
            : ""
        }

        ${
          d.note
            ? `📝 ${d.note}<br>`
            : ""
        }
      </div>
    `;
  });

  document.getElementById("resultado").innerHTML = html;
}

// TERRITORIO
async function buscarTerritorio() {
  const t = document.getElementById("territorioInput").value;

  const res = await fetch(`/territory/${t}`);
  const data = await res.json();

  let html = "";

  data.forEach(b => {
    html += `
      <div class="card">
        <b>${b.address}</b><br>
        <span class="mini">${b.name || ""}</span>
      </div>
    `;
  });

  document.getElementById("listaTerritorio").innerHTML = html;
}
function abrirSeccion(id) {

  document.getElementById("menu").style.display = "none";

  document.querySelectorAll("body > div").forEach(d => {
    if (d.id !== "login" && d.id !== "menu") {
      d.style.display = "none";
    }
  });

  document.getElementById(id).style.display = "block";

  if (id === "territorio") {
    cargarDashboard(); // 👈 magia acá
  }
}
// LISTADO
async function cargarEdificios() {

  listaEdificios.innerHTML = "⏳ Cargando edificios...";

  const sort = ordenActual === "all" ? "" : ordenActual;

  const res = await fetch(`/admin/buildings?sort=${sort}&page=${paginaActual}`);
  const result = await res.json();

  const data = result.data;
  totalPaginas = result.totalPages;

  let html = `<div class="gridBuildings">`;

  data.forEach(b => {

    html += `
      <div class="cardBuilding" onclick='verEdificio(${JSON.stringify(b)})'>
        <b>${b.address}</b>

        <div class="small">
          🕒 ${
            b.lastVisit
              ? new Date(b.lastVisit).toLocaleDateString()
              : "Sin visitas"
          }
        </div>

        <div class="small">
          🗺 ${b.territory || "-"}
        </div>
        ${b.description ? `<div class="small">📝 ${b.description}</div>` : ""}
      </div>
    `;
  });

  html += `</div>`;

  // 🔽 PAGINACIÓN
  html += `
    <div style="text-align:center; margin-top:15px;">
      <button onclick="cambiarPagina(-1)" ${paginaActual === 1 ? "disabled" : ""}>
        ⬅
      </button>

      Página ${paginaActual} de ${totalPaginas}

      <button onclick="cambiarPagina(1)" ${paginaActual === totalPaginas ? "disabled" : ""}>
        ➡
      </button>
    </div>
  `;

  listaEdificios.innerHTML = html;
}

function cambiarPagina(dir) {

  paginaActual += dir;

  if (paginaActual < 1) paginaActual = 1;
  if (paginaActual > totalPaginas) paginaActual = totalPaginas;

  cargarEdificios();
}

listaEdificios.innerHTML = `
  <div style="text-align:center; padding:20px;">
    ⏳ Cargando edificios...<br>
    <small>Esto puede tardar unos segundos</small>
  </div>
`;
  
function ordenar(v) {
  ordenActual = v;
  paginaActual = 1; // reset
}

async function verEdificio(b) {

  abrirSeccion("detalleEdificio");

  const cont = document.getElementById("detalleContenido");

  cont.innerHTML = "Cargando...";

  const res = await fetch(`/history/${b._id}`);
  const data = await res.json();

  const issuesRes = await fetch(`/issues?status=PENDIENTE`);
  const issues = await issuesRes.json();

  const issuesDelEdificio = issues.filter(i =>
    i.buildingId?._id === b._id
  );

  let html = `
    <div class="card">
      <h3>${b.address}</h3>
      ${b.address2 || ""}<br>
      ${b.name || ""}<br>
      🗺 Territorio: ${b.territory || "-"}<br><br>
      ${b.description ? `📝 ${b.description}<br><br>` : ""}
      <button class="secondary" onclick='editarDesdeListado(${JSON.stringify(b)})'>
        ✏️ Editar
      </button>
    </div>
  `;

  if (issuesDelEdificio.length) {
    html += `
      <div class="card" style="border-left:5px solid red;">
        <b>⚠ Problemas:</b><br>
        ${issuesDelEdificio.map(i =>
          `• ${i.description || i.type}`
        ).join("<br>")}
      </div>
    `;
  }

  data.detalle.forEach(d => {

    html += `
      <div class="card">
        <b>${d.number}</b><br>
        Estado: ${d.lastStatus || "Nunca"}<br>

        ${
          d.lastDate
            ? `📅 ${new Date(d.lastDate).toLocaleDateString()}<br>`
            : ""
        }

        ${
          d.note
            ? `📝 ${d.note}<br>`
            : ""
        }
      </div>
    `;
  });

  cont.innerHTML = html;
}  
  
async function buscarParaEditar() {

  const q = document.getElementById("buscarEdit").value.trim();
  if (!q) return alert("Escribí algo");

  const cont = document.getElementById("resultadoEdit");
  cont.innerHTML = "Buscando...";

  // 🔍 Buscar edificio exacto
  const b = await fetch(`/building/${encodeURIComponent(q)}`);
  const building = await b.json();

  // ✅ SI EXISTE → EDITAR
  if (building._id) {
    document.getElementById("modoForm").innerText = "✏️ Editando edificio";
    cont.innerHTML = "";
    return mostrarFormulario(building);
  }

  // 🔎 Buscar por territorio o coincidencias
  const res = await fetch(`/territory/${q}`);
  const lista = await res.json();

  cont.innerHTML = "";

  // 👉 SI HAY RESULTADOS → mostrar opciones
  if (lista.length) {
    document.getElementById("modoForm").innerText = "Seleccioná un edificio";

    lista.forEach(b => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerText = b.address;
      div.onclick = () => mostrarFormulario(b);
      cont.appendChild(div);
    });

  } else {
    // ➕ SI NO HAY NADA → CREAR NUEVO
    document.getElementById("modoForm").innerText = "➕ Nuevo edificio";
    document.getElementById("formEdit").style.display = "block";

    // limpiar formulario
    document.getElementById("edit_address").value = q;
    document.getElementById("edit_address2").value = "";
    document.getElementById("edit_name").value = "";
    document.getElementById("edit_territory").value = "";
    document.getElementById("edit_floors").value = "";
    document.getElementById("edit_units").value = "";
    document.getElementById("edit_pb").checked = false;
    document.getElementById("edit_portero").checked = false;
    document.getElementById("edit_description").value = "";
  }
}

function mostrarFormulario(b) {

  buildingEditId = b._id;
  document.getElementById("formEdit").style.display = "block";

  document.getElementById("edit_address").value = b.address || "";
  document.getElementById("edit_address2").value = b.address2 || "";
  document.getElementById("edit_name").value = b.name || "";
  document.getElementById("edit_territory").value = b.territory || "";
  document.getElementById("edit_floors").value = b.floors || "";
  document.getElementById("edit_units").value = b.unitsPerFloor || "";
  document.getElementById("edit_pb").checked = b.hasGroundFloor || false;
  document.getElementById("edit_portero").checked = b.hasDoorman || false;
  document.getElementById("edit_description").value = b.description || "";
  document.getElementById("modoForm").innerText = "✏️ Editando edificio";
}

async function guardarEdificio() {

  const msg = document.getElementById("msgEdit");

  const address = normalizarDireccion(
  document.getElementById("edit_address").value
);
  const floors = Number(document.getElementById("edit_floors").value);
  const units = Number(document.getElementById("edit_units").value);

  if (!address) return msg.innerText = "Dirección obligatoria";
  if (floors <= 0) return msg.innerText = "Pisos inválidos";
  if (units <= 0) return msg.innerText = "Unidades inválidas";

  msg.innerText = "Guardando...";

  await fetch(`/building/${buildingEditId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      address,
      address2: document.getElementById("edit_address2").value,
      name: document.getElementById("edit_name").value,
      territory: document.getElementById("edit_territory").value,
      floors,
      unitsPerFloor: units,
      hasGroundFloor: document.getElementById("edit_pb").checked,
      hasDoorman: document.getElementById("edit_portero").checked,
      description: document.getElementById("edit_description").value
    })
  });

  msg.innerText = "✅ Guardado correctamente";

setTimeout(() => {
  cancelarEdicion();
  msg.innerText = "";

  // limpiar búsqueda
  document.getElementById("buscarEdit").value = "";

}, 5000);
}

function cancelarEdicion() {
  document.getElementById("formEdit").style.display = "none";
  buildingEditId = null;
}

// PROBLEMAS
async function cargarIssues() {

  const res = await fetch("/issues");
  const data = await res.json();

  let html = "";

  if (!data.length) {
    html = "<p>No hay problemas reportados</p>";
  }

  data.forEach(i => {

    html += `
      <div class="card">
        <b>${i.type}</b><br>
        📍 ${i.buildingId?.address || "-"}<br>
        📝 ${i.description || "-"}<br>
        🕒 ${new Date(i.createdAt).toLocaleDateString()}<br>

        <b>Estado:</b> ${i.status}<br><br>

        <button onclick="cambiarEstado('${i._id}','EN_PROCESO')" class="secondary">
          En proceso
        </button>

        <button onclick="cambiarEstado('${i._id}','RESUELTO')" class="primary">
          Resolver
        </button>
      </div>
    `;
  });

  document.getElementById("listaIssues").innerHTML = html;
}

async function cambiarEstado(id, estado) {

  await fetch(`/issues/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: estado })
  });

  cargarIssues();
}

  window.addEventListener("load", () => {

  const params = new URLSearchParams(window.location.search);
  const direccion = params.get("crear");

  if (direccion) {

    modoSoloCrear = true;

    // ocultar todo
    document.getElementById("login").style.display = "none";
    document.getElementById("menu").style.display = "none";

    // mostrar solo editar
    document.getElementById("editar").style.display = "block";

    document.getElementById("modoForm").innerText = "➕ Nuevo edificio";
    document.getElementById("formEdit").style.display = "block";

    document.getElementById("edit_address").value = direccion;

    return;
  }

});
  
  function volver() {

  if (modoSoloCrear) {
    window.location.href = "/";
    return;
  }

  window.location.href = "/";
}
  
function abrirSeccion(id) {

  if (modoSoloCrear) return; // 🚫 bloqueo total

  document.getElementById("menu").style.display = "none";

  document.querySelectorAll("body > div").forEach(d => {
    if (d.id !== "login" && d.id !== "menu") {
      d.style.display = "none";
    }
  });

  document.getElementById(id).style.display = "block";

  if (id === "territorio") {
    cargarDashboard();
  }
}
  
  function normalizarDireccion(dir) {

  return dir
    .toLowerCase()

    // quitar tildes
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")

    // reemplazos comunes
    .replace(/\bav\b|\bav\.\b/g, "avenida")
    .replace(/\bgral\b/g, "general")
    .replace(/\bdr\b|\bdr\.\b/g, "doctor")

    // eliminar símbolos
    .replace(/[^a-z0-9 ]/g, "")

    // espacios dobles
    .replace(/\s+/g, " ")
    .trim();
}
</script>
