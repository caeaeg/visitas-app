<!DOCTYPE html>
<html>
<head>
  <title>Admin - Historial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #fafafa;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .ok {
      border-left: 5px solid #4CAF50;
    }

    .no {
      border-left: 5px solid #f44336;
    }

    .never {
      border-left: 5px solid #999;
    }

    .resumen {
      background: #e3f2fd;
    }
  </style>
</head>

<body>

<h2>📊 Panel Administrador</h2>

<input id="dir" placeholder="Dirección del edificio">
<button onclick="cargar()">Ver historial</button>

<div id="resultado"></div>

<script>
async function cargar() {
  const input = document.getElementById("dir").value;

  if (!input) {
    alert("Ingresá una dirección");
    return;
  }

  const b = await fetch(`/building/${encodeURIComponent(input)}`);
  const building = await b.json();

  if (!building._id) {
    alert("No existe el edificio");
    return;
  }

  const res = await fetch(`/history/${building._id}`);
  const data = await res.json();

  const cont = document.getElementById("resultado");
  cont.innerHTML = "";

  // 🔥 RESUMEN
  cont.innerHTML += `
    <div class="card resumen">
      <b>📊 Resumen</b><br><br>
      Total: ${data.total}<br>
      ✔ Atendieron: ${data.atendidos}<br>
      ✖ No atendieron: ${data.noAtendieron}<br>
      ⭕ Nunca visitados: ${data.nunca}<br>
      <br>
      <b>Progreso: ${data.progreso}%</b>
    </div>
  `;

  // 🔽 DETALLE
  data.detalle.forEach(d => {

    let clase = "never";
    let estado = "Nunca visitado";

    if (d.lastStatus === "ATENDIO") {
      clase = "ok";
      estado = "Atendió";
    } else if (d.lastStatus === "NO_EN_CASA") {
      clase = "no";
      estado = "No atendió";
    }

    cont.innerHTML += `
      <div class="card ${clase}">
        <b>${d.number}</b><br>
        Estado: ${estado}<br>
        Fecha: ${d.lastDate ? new Date(d.lastDate).toLocaleDateString() : "-"}<br>
        Nota: ${d.note || "-"}
      </div>
    `;
  });
}
</script>

</body>
</html>
