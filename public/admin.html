<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #fafafa;
    }

    input, button, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 8px;
    }

    .card {
      background: white;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .hidden {
      display: none;
    }

    .primary {
      background: #2196F3;
      color: white;
    }

    .secondary {
      background: #555;
      color: white;
    }

    .danger {
      background: #f44336;
      color: white;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <h2>🔒 Acceso Administrador</h2>
  <input id="clave" type="password" placeholder="Clave numérica">
  <button class="primary" onclick="verificar()">Entrar</button>
  <button class="secondary" onclick="volver()">⬅ Volver</button>
</div>

<!-- 📊 PANEL -->
<div id="panel" class="hidden">

  <h2>📊 Panel Administrador</h2>

  <button class="secondary" onclick="volver()">⬅ Volver</button>

  <!-- 🔹 HISTORIAL -->
  <h3>Historial por edificio</h3>

  <input id="dir" placeholder="Dirección del edificio">
  <button class="primary" onclick="cargar()">Ver historial</button>

  <div id="resultado"></div>

  <!-- 🔹 EDICIÓN -->
  <h3>✏️ Editar edificios</h3>

  <input id="buscarEdit" placeholder="Dirección o territorio">
  <button class="primary" onclick="buscarEditar()">Buscar</button>

  <div id="listaEditar"></div>

  <div id="formEditar" class="hidden">
    <h4>Editando edificio</h4>

    <input id="editName" placeholder="Nombre">
    <input id="editAddress" placeholder="Dirección">
    <input id="editAddress2" placeholder="Dirección 2 (opcional)">
    <input id="editTerritory" placeholder="Territorio">
    <textarea id="editDescription" placeholder="Descripción"></textarea>

    <button class="primary" onclick="guardarEdificio()">💾 Guardar cambios</button>
  </div>


</button>
  <!-- 🔹 PROBLEMAS -->
  <h3>⚠️ Soluciones a problemas</h3>

  <button class="primary" onclick="cargarReportes()">Ver reportes</button>

  <div id="reportes"></div>

</div>

<script>

const CLAVE = "2414";
let buildingEditId = null;

// 🔐 LOGIN
function verificar() {
  const input = document.getElementById("clave").value;

  if (input === CLAVE) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Clave incorrecta");
  }
}

function volver() {
  window.location.href = "/";
}

// 🔹 HISTORIAL
async function cargar() {

  const input = document.getElementById("dir").value;

  if (!input) return alert("Ingresá una dirección");

  const b = await fetch(`/building/${encodeURIComponent(input)}`);
  const building = await b.json();

  if (!building._id) return alert("No existe");

  const res = await fetch(`/history/${building._id}`);
  const data = await res.json();

  const cont = document.getElementById("resultado");
  cont.innerHTML = "";

  cont.innerHTML += `
    <div class="card">
      <b>Resumen</b><br>
      Total: ${data.total}<br>
      Atendieron: ${data.atendidos}<br>
      No atendieron: ${data.noAtendieron}<br>
      Nunca: ${data.nunca}<br>
      Progreso: ${data.progreso}%
    </div>
  `;
}

// 🔹 BUSCAR PARA EDITAR
async function buscarEditar() {

  const q = document.getElementById("buscarEdit").value;
  if (!q) return;

  const res = await fetch(`/admin/search-buildings?q=${encodeURIComponent(q)}`);
  const data = await res.json();

  let html = "";

  data.forEach(b => {
    html += `
      <div class="card" onclick='seleccionarEditar(${JSON.stringify(b)})'>
        <b>${b.name || "Sin nombre"}</b><br>
        ${b.address}<br>
        ${b.territory || "-"}
      </div>
    `;
  });

  document.getElementById("listaEditar").innerHTML = html;
}

function seleccionarEditar(b) {

  buildingEditId = b._id;

  document.getElementById("formEditar").style.display = "block";

  document.getElementById("editName").value = b.name || "";
  document.getElementById("editAddress").value = b.address || "";
  document.getElementById("editAddress2").value = b.address2 || "";
  document.getElementById("editTerritory").value = b.territory || "";
  document.getElementById("editDescription").value = b.description || "";
}

// 🔹 GUARDAR EDICIÓN
async function guardarEdificio() {

  await fetch(`/building/${buildingEditId}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: document.getElementById("editName").value,
      address: document.getElementById("editAddress").value,
      address2: document.getElementById("editAddress2").value,
      territory: document.getElementById("editTerritory").value,
      description: document.getElementById("editDescription").value
    })
  });

  alert("Edificio actualizado");
}

// 🔹 REPORTES
async function cargarReportes() {

  const res = await fetch("/reports");
  const data = await res.json();

  let html = "";

  data.forEach(r => {
    html += `
      <div class="card">
        <b>${r.building?.address || "Sin dirección"}</b><br>
        📝 ${r.message}<br>
        🕒 ${new Date(r.date).toLocaleString()}<br>

        <button class="secondary" onclick="resolver('${r._id}')">
          ✔ Marcar como resuelto
        </button>
      </div>
    `;
  });

  document.getElementById("reportes").innerHTML = html;
}

async function resolver(id) {

  await fetch(`/report/${id}/resolve`, {
    method: "PUT"
  });

  cargarReportes();
}

</script>

</body>
</html>
