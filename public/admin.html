<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #fafafa;
    }

    input, button, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 8px;
    }

    .card {
      background: white;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .hidden {
      display: none;
    }

    .primary {
      background: #2196F3;
      color: white;
    }

    .secondary {
      background: #555;
      color: white;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <h2>🔒 Acceso Administrador</h2>
  <input id="clave" type="password" placeholder="Clave numérica">
  <button class="primary" onclick="verificar()">Entrar</button>
  <button class="secondary" onclick="volver()">⬅ Volver</button>
</div>

<!-- 📊 PANEL -->
<div id="panel" class="hidden">

  <h2>📊 Panel Administrador</h2>

  <button class="secondary" onclick="volver()">⬅ Volver</button>

  <!-- 🔹 HISTORIAL -->
  <h3>Historial por edificio</h3>

  <input id="dir" placeholder="Dirección del edificio">
  <button class="primary" onclick="cargar()">Ver historial</button>

  <div id="resultado"></div>

  <!-- 🔹 LISTADO -->
  <h3>🏢 Edificios</h3>

  <button class="primary" onclick="cargarEdificios()">Ver edificios</button>

  <select onchange="ordenar(this.value)">
    <option value="">Ordenar...</option>
    <option value="territory">Por territorio</option>
    <option value="recent">Recientes</option>
    <option value="most">Más trabajados</option>
  </select>

  <div id="listaEdificios"></div>

</div>

<script>

const CLAVE = "2414";
let ordenActual = "";

// 🔐 LOGIN
function verificar() {
  const input = document.getElementById("clave").value;

  if (input === CLAVE) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Clave incorrecta");
  }
}

function volver() {
  window.location.href = "/";
}

// 🔹 HISTORIAL
async function cargar() {

  const input = document.getElementById("dir").value;

  if (!input) {
    alert("Ingresá una dirección");
    return;
  }

  try {

    const b = await fetch(`/building/${encodeURIComponent(input)}`);
    const building = await b.json();

    if (!building._id) {
      alert("No existe el edificio");
      return;
    }

    const res = await fetch(`/history/${building._id}`);
    const data = await res.json();

    const cont = document.getElementById("resultado");
    cont.innerHTML = "";

    cont.innerHTML += `
      <div class="card">
        <b>Resumen</b><br>
        Total: ${data.total}<br>
        Atendieron: ${data.atendidos}<br>
        No atendieron: ${data.noAtendieron}<br>
        Nunca: ${data.nunca}<br>
        Progreso: ${data.progreso}%
      </div>
    `;

    data.detalle.forEach(d => {
      cont.innerHTML += `
        <div class="card">
          <b>${d.number}</b><br>
          Estado: ${d.lastStatus || "Nunca"}<br>
          Fecha: ${d.lastDate ? new Date(d.lastDate).toLocaleDateString() : "-"}<br>
          Nota: ${d.note || "-"}
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    alert("Error cargando historial");
  }
}

// 🔹 ORDEN
function ordenar(tipo) {
  ordenActual = tipo;
  cargarEdificios();
}

// 🔹 LISTADO EDIFICIOS
async function cargarEdificios() {

  try {

    const res = await fetch(`/admin/buildings?sort=${ordenActual}`);
    const data = await res.json();

    let html = "";

    if (!data.length) {
      html = "<p>No hay edificios</p>";
    }

    data.forEach(b => {
      html += `
        <div class="card">
          <b>${b.name || "Sin nombre"}</b><br>
          📍 ${b.address}<br>
          🗺 ${b.territory || "Sin territorio"}<br>
          🔁 Visitas: ${b.totalVisits}<br>
          🕒 Última: ${b.lastVisitDate ? new Date(b.lastVisitDate).toLocaleDateString() : "Nunca"}
        </div>
      `;
    });

    document.getElementById("listaEdificios").innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById("listaEdificios").innerHTML =
      "<p>Error cargando edificios</p>";
  }
}

</script>

</body>
</html>
