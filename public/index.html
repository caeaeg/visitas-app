<!DOCTYPE html>
<html>
<head>
  <title>Visitas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #f5f5f5;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      padding: 12px;
      margin: 5px 0;
      font-size: 16px;
      border: none;
      border-radius: 8px;
    }

    .buscar {
      width: 100%;
      background-color: #2196F3;
      color: white;
    }

    .ok {
      background-color: #4CAF50;
      color: white;
      width: 100%;
    }

    .no {
      background-color: #f44336;
      color: white;
      width: 100%;
    }

    .secondary {
      background-color: #555;
      color: white;
      width: 100%;
    }

    #adminBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      font-size: 20px;
    }

    #resultado {
      font-size: 22px;
      margin-top: 20px;
    }

    #estado {
      margin-top: 10px;
      color: gray;
      white-space: pre-line;
    }

    #listaTerritorio button {
      width: 100%;
      text-align: left;
      background: white;
      margin: 5px 0;
      border: 1px solid #ddd;
    }

    .link {
      color: blue;
      cursor: pointer;
      text-decoration: underline;
      font-size: 14px;
    }
  </style>
</head>

<body>

<button id="adminBtn" onclick="irAdmin()">🔒</button>

<h2>📍 Visitas</h2>

<input id="buildingId" placeholder="Código o dirección"
onkeypress="if(event.key==='Enter') buscar()">

<div class="link" onclick="buscarPorTerritorio()">
  Buscar por territorio
</div>

<p id="mensajeInicial">Ingresá una dirección para comenzar</p>

<button class="buscar" onclick="buscar()">Buscar</button>

<div id="listaTerritorio"></div>

<h3 id="resultado"></h3>
<p id="estado"></p>

<textarea id="nota" placeholder="Nota..." style="display:none;"></textarea>

<button id="btnOk" class="ok" onclick="marcar('ATENDIO')" style="display:none;">
✔ ATENDIÓ
</button>

<button id="btnNo" class="no" onclick="marcar('NO_EN_CASA')" style="display:none;">
✖ NO EN CASA
</button>

<button id="btnSiguiente" class="secondary" onclick="siguiente()" style="display:none;">
➡ Siguiente departamento
</button>

<button id="btnNuevoEdificio" class="secondary" onclick="crearEdificio()" style="display:none;">
➕ Agregar edificio
</button>

<script>
let currentDept = null;
let currentBuildingId = null;
let currentBuildingData = null;

function irAdmin() {
  window.location.href = "/admin.html";
}

// 🔹 BUSCAR NORMAL
async function buscar() {

  limpiarVista();

  const input = document.getElementById("buildingId").value.trim();
  if (!input) return;

  document.getElementById("mensajeInicial").style.display = "none";

  const b = await fetch(`/building/${encodeURIComponent(input)}`);
  const building = await b.json();

  if (!building._id) {
    document.getElementById("resultado").innerText = "Edificio no encontrado";
    document.getElementById("btnNuevoEdificio").style.display = "block";
    return;
  }

  currentBuildingId = building._id;
  currentBuildingData = building;

  await cargarDepto();
}

// 🔹 BUSCAR POR TERRITORIO
async function buscarPorTerritorio() {

  limpiarVista();

  const territorio = prompt("Número de territorio:");
  if (!territorio) return;

  const res = await fetch(`/territory/${territorio}`);
  const data = await res.json();

  const cont = document.getElementById("listaTerritorio");

  if (!data.length) {
    cont.innerHTML = "No hay edificios en ese territorio";
    return;
  }

  cont.innerHTML = "";

  data.forEach(b => {
    const btn = document.createElement("button");
    btn.innerText = b.address;
    btn.onclick = () => seleccionarEdificio(b);
    cont.appendChild(btn);
  });
}

function seleccionarEdificio(building) {
  limpiarVista();

  currentBuildingId = building._id;
  currentBuildingData = building;

  cargarDepto();
}

// 🔹 CARGAR DEPTO
async function cargarDepto() {

  const res = await fetch(`/next/${currentBuildingId}`);
  const data = await res.json();

  if (data.message === "NO_AVAILABLE") {
    document.getElementById("resultado").innerText =
      "No hay departamentos disponibles";
    return;
  }

  currentDept = data.dept;

  document.getElementById("resultado").innerText =
    "Depto: " + data.dept.number;

  document.getElementById("nota").style.display = "block";
  document.getElementById("btnOk").style.display = "block";
  document.getElementById("btnNo").style.display = "block";
}

// 🔹 MARCAR
async function marcar(status) {

  const note = document.getElementById("nota").value;

  await fetch("/visit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      departmentId: currentDept._id,
      status,
      note
    })
  });

  document.getElementById("btnSiguiente").style.display = "block";
}

// 🔹 SIGUIENTE
async function siguiente() {
  document.getElementById("nota").value = "";
  await cargarDepto();
}

// 🔹 LIMPIAR UI
function limpiarVista() {
  document.getElementById("listaTerritorio").innerHTML = "";
  document.getElementById("resultado").innerText = "";
  document.getElementById("estado").innerText = "";

  document.getElementById("nota").style.display = "none";
  document.getElementById("btnOk").style.display = "none";
  document.getElementById("btnNo").style.display = "none";
  document.getElementById("btnSiguiente").style.display = "none";
  document.getElementById("btnNuevoEdificio").style.display = "none";
}
</script>

</body>
</html>
