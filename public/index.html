<!DOCTYPE html>
<html>
<head>
  <title>Visitas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #f5f5f5;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 5px 0;
      font-size: 18px;
      border: none;
      border-radius: 8px;
    }

    .ok {
      background-color: #4CAF50;
      color: white;
    }

    .no {
      background-color: #f44336;
      color: white;
    }

    .buscar {
      background-color: #2196F3;
      color: white;
    }

    #resultado {
      font-size: 22px;
      margin-top: 20px;
    }

    #estado {
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>

<body>

<h2>📍 Visitas</h2>

<input id="buildingId" placeholder="Código o dirección">
<button class="buscar" onclick="buscar()">Buscar</button>
<button onclick="buscar()">➡ Siguiente</button>

<h3 id="resultado"></h3>
<p id="estado"></p>

<button class="ok" onclick="marcar('ATENDIO')">✔ ATENDIÓ</button>
<button class="no" onclick="marcar('NO_EN_CASA')">✖ NO EN CASA</button>

<textarea id="nota" placeholder="Nota..."></textarea>

<button onclick="crearEdificio()">➕ Nuevo edificio</button>
  
<script>
let currentDept = null;

async function buscar() {
  const input = document.getElementById("buildingId").value;

  if (!input) {
    alert("Ingresá una dirección");
    return;
  }

  const b = await fetch(`/building/${encodeURIComponent(input)}`);
  const building = await b.json();

  if (!building._id) {
    document.getElementById("resultado").innerText =
      "Edificio no encontrado";

    document.getElementById("estado").innerHTML =
      `<button onclick="crearEdificio()">➕ Agregar edificio</button>`;

    return;
  }

  const res = await fetch(`/next/${building._id}`);
  const data = await res.json();

  if (data.message === "NO_AVAILABLE") {
    document.getElementById("resultado").innerText =
      "No hay departamentos pendientes (todos atendidos en los últimos 6 meses)";
    
    document.getElementById("estado").innerText = "";
    return;
  }

  currentDept = data.dept;

  document.getElementById("resultado").innerText =
    "Depto: " + data.dept.number;

  if (data.lastVisit && data.lastVisit.status === "NO_EN_CASA") {
    document.getElementById("estado").innerText =
      `Visitado el ${new Date(data.lastVisit.date).toLocaleDateString()} - No atendió. Nota: ${data.lastVisit.note || "Sin nota"}`;
  } else {
    document.getElementById("estado").innerText = "";
  }
}

async function crearEdificio() {
  const direccion = document.getElementById("buildingId").value;

  const floors = prompt("¿Cuántos pisos?");
  const units = prompt("¿Departamentos por piso?");
  const pb = confirm("¿Tiene planta baja?");
  const portero = confirm("¿Tiene portero?");

  const res = await fetch("/building", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      address: direccion,
      floors: Number(floors),
      unitsPerFloor: Number(units),
      hasGroundFloor: pb,
      hasDoorman: portero
    })
  });

  const data = await res.json();

  if (data.error) {
    alert("Datos inválidos");
    return;
  }

  if (data.message === "EXISTS") {
    document.getElementById("estado").innerText =
      "⚠️ El edificio ya estaba cargado";
  } else {
    document.getElementById("estado").innerText =
      "✔ Edificio creado";
  }

  buscar();
}

async function marcar(status) {
  if (!currentDept) {
    alert("Primero buscá un departamento");
    return;
  }

  const note = document.getElementById("nota").value;

  await fetch("/visit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      departmentId: currentDept._id,
      status,
      note
    })
  });

  document.getElementById("estado").innerText =
    "✔ Guardado: " + status;

  document.getElementById("nota").value = "";

  buscar();
}

  function irAdmin() {
  window.location.href = "/admin.html";
}
</script>

</body>
</html>

<button onclick="irAdmin()">🔒 Admin</button>
