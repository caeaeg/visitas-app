<!DOCTYPE html>
<html>
<head>
  <title>Visitas</title>
</head>
<body>

<h2>Buscar edificio</h2>

<input id="buildingId" placeholder="Código o dirección">
<button onclick="buscar()">Buscar</button>

<h3 id="resultado"></h3>
<p id="estado"></p>

<button onclick="marcar('ATENDIO')">ATENDIÓ</button>
<button onclick="marcar('NO_EN_CASA')">NO EN CASA</button>

<br><br>
<textarea id="nota" placeholder="Nota..."></textarea>

<script>
let currentDept = null;

async function buscar() {
  const input = document.getElementById("buildingId").value;

  const b = await fetch(`/building/${input}`);
  const building = await b.json();

  const res = await fetch(`/next/${building._id}`);
  const data = await res.json();

  currentDept = data;

  document.getElementById("resultado").innerText =
    "Departamento: " + data.number;
}

async function marcar(status) {
  if (!currentDept) return alert("Primero buscá un departamento");

  const note = document.getElementById("nota").value;

  await fetch("/visit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      departmentId: currentDept._id,
      status,
      note
    })
  });

  // 👇 ESTA ES LA MEJORA CLAVE
  document.getElementById("estado").innerText =
    "Última acción: " + status;

  alert("Guardado");

  buscar(); // trae el siguiente depto automáticamente
}
</script>

</body>
</html>
