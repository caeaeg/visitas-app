<!DOCTYPE html>
<html>
<head>
  <title>Visitas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #f5f5f5;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 5px 0;
      font-size: 18px;
      border: none;
      border-radius: 8px;
    }

    .ok {
      background-color: #4CAF50;
      color: white;
    }

    .no {
      background-color: #f44336;
      color: white;
    }

    .buscar {
      background-color: #2196F3;
      color: white;
    }

    .secondary {
      background-color: #555;
      color: white;
    }

    #resultado {
      font-size: 22px;
      margin-top: 20px;
    }

    #estado {
      margin-top: 10px;
      color: gray;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h2>📍 Visitas</h2>

<input id="buildingId" placeholder="Código o dirección"
  onkeypress="if(event.key==='Enter') buscar()">

<button class="buscar" onclick="buscar()">Buscar</button>

<button onclick="crearEdificio()">➕ Nuevo edificio</button>
<button onclick="irAdmin()">🔒 Admin</button>

<h3 id="resultado">Ingresá una dirección para comenzar</h3>
<p id="estado"></p>

<textarea id="nota" placeholder="Nota..."></textarea>

<button id="btnOk" class="ok" onclick="marcar('ATENDIO')" style="display:none;">
✔ ATENDIÓ
</button>

<button id="btnNo" class="no" onclick="marcar('NO_EN_CASA')" style="display:none;">
✖ NO EN CASA
</button>

<button id="btnSiguiente" class="secondary" onclick="siguiente()" style="display:none;">
➡ Siguiente departamento
</button>

<button id="btnUltimo" class="secondary" onclick="verUltimo()" style="display:none;">
🧾 Ver último informe
</button>

<script>
let currentDept = null;
let currentBuildingId = null;
let currentBuildingData = null;
let lastVisitData = null;

window.onload = () => {
  const last = localStorage.getItem("lastBuilding");
  if (last) {
    document.getElementById("buildingId").value = last;
  }
};

function irAdmin() {
  window.location.href = "/admin.html";
}

async function buscar() {

  const input = document.getElementById("buildingId").value.trim();
  if (!input) return;

  document.getElementById("resultado").innerText = "Buscando...";
  document.getElementById("estado").innerText = "";

  document.getElementById("btnOk").style.display = "none";
  document.getElementById("btnNo").style.display = "none";
  document.getElementById("btnSiguiente").style.display = "none";
  document.getElementById("btnUltimo").style.display = "none";

  localStorage.setItem("lastBuilding", input);

  const b = await fetch(`/building/${encodeURIComponent(input)}`);
  const building = await b.json();

  if (!building._id) {
    document.getElementById("resultado").innerText =
      "Edificio no encontrado";

    document.getElementById("estado").innerHTML =
      `<button onclick="crearEdificio('${input}')">
        ➕ Agregar edificio
      </button>`;

    currentDept = null;
    return;
  }

  currentBuildingId = building._id;
  currentBuildingData = building;

  await cargarDepto();
}

async function cargarDepto() {

  const res = await fetch(`/next/${currentBuildingId}`);
  const data = await res.json();

  if (data.message === "NO_AVAILABLE") {
    document.getElementById("resultado").innerText =
      "No hay departamentos sin atender";

    currentDept = null;
    return;
  }

  currentDept = data.dept;

  document.getElementById("resultado").innerText =
    "Depto: " + data.dept.number;

  document.getElementById("btnOk").style.display = "block";
  document.getElementById("btnNo").style.display = "block";

  let info = "";

  if (currentBuildingData.name) info += "🏢 " + currentBuildingData.name + "\n";
  if (currentBuildingData.territory) info += "📍 Territorio: " + currentBuildingData.territory + "\n";
  if (currentBuildingData.description) info += "📝 " + currentBuildingData.description;

  if (data.lastVisit && data.lastVisit.status === "NO_EN_CASA") {
    info += `\n\n⚠ Visitado el ${new Date(data.lastVisit.date).toLocaleDateString()} - No atendió`;
    if (data.lastVisit.note) {
      info += `\nNota: ${data.lastVisit.note}`;
    }
  }

  document.getElementById("estado").innerText = info;
}

async function crearEdificio(direccion = "") {

  if (!direccion) {
    direccion = prompt("Dirección del edificio:");
    if (!direccion) return;
  }

  const floors = prompt("¿Cuántos pisos?");
  const units = prompt("¿Departamentos por piso?");
  const pb = confirm("¿Tiene planta baja?");
  const portero = confirm("¿Tiene portero?");

  const res = await fetch("/building", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      address: direccion,
      floors: Number(floors),
      unitsPerFloor: Number(units),
      hasGroundFloor: pb,
      hasDoorman: portero
    })
  });

  const data = await res.json();

  if (data.message === "EXISTS") {
    alert("El edificio ya estaba cargado");
  } else {
    alert("Edificio creado");
  }

  buscar();
}

async function marcar(status) {

  if (!currentDept) {
    alert("Primero buscá un departamento");
    return;
  }

  const note = document.getElementById("nota").value;

  const res = await fetch("/visit", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    departmentId: currentDept._id,
    status,
    note
  })
});

const text = await res.text();
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      departmentId: currentDept._id,
      status,
      note
    })
  });

  lastVisitData = {
    department: currentDept.number,
    status,
    note,
    date: new Date()
  };

  document.getElementById("estado").innerText =
    "✔ Guardado. Revisá si querés y avanzá.";

  document.getElementById("btnSiguiente").style.display = "block";
  document.getElementById("btnUltimo").style.display = "block";
abrirModal();
}

async function siguiente() {
  document.getElementById("nota").value = "";
  await cargarDepto();
}

function verUltimo() {

  if (!lastVisitData) {
    alert("No hay datos");
    return;
  }

  alert(
`Depto: ${lastVisitData.department}
Estado: ${lastVisitData.status}
Fecha: ${lastVisitData.date.toLocaleDateString()}
Nota: ${lastVisitData.note || "Sin nota"}`
  );
}


  function abrirModal() {

  if (!lastVisitData) return;

  document.getElementById("modal").style.display = "flex";

  document.getElementById("modalInfo").innerText =
`Depto: ${lastVisitData.department}
Estado: ${lastVisitData.status}
Fecha: ${lastVisitData.date.toLocaleDateString()}`;

  document.getElementById("modalNota").value =
    lastVisitData.note || "";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

async function guardarEdicion() {

  const nuevaNota = document.getElementById("modalNota").value;

  // actualizar en memoria
  lastVisitData.note = nuevaNota;

  // ⚠️ actualizar en backend (necesitamos id de visita más adelante)
  // por ahora solo actualiza visual

  alert("Nota actualizada (modo local)");

  cerrarModal();
}
  
</script>

  <div id="modal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:10px;
    width:90%;
    max-width:400px;
  ">

    <h3>🧾 Último informe</h3>

    <p id="modalInfo"></p>

    <textarea id="modalNota" placeholder="Editar nota..."></textarea>

    <button onclick="guardarEdicion()" class="ok">💾 Guardar cambios</button>
    <button onclick="cerrarModal()" class="secondary">Cerrar</button>

  </div>
</div>
  
</body>
</html>
