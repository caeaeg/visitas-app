<!DOCTYPE html>
<html>
<head>
  <title>Visitas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 18px;
  line-height: 1.5;
  padding: 15px;
  background: #fafafa;
}
    h2 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 20px;
}
    .container {
  max-width: 500px;
  margin: auto;
  padding: 10px;
}
    .card-container {
  background: white;
  border-radius: 18px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}
body.dark {
  background: #121212;
  color: #e0e0e0;
}

body.dark .card-container {
  background: #1e1e1e;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

body.dark input,
body.dark textarea,
body.dark select {
  background: #2a2a2a;
  color: white;
  border: 1px solid #444;
}

body.dark button.primary {
  background: #3b82f6;
}

body.dark button.secondary {
  background: #444;
}
body.dark .card {
  background: #1f1f1f;
  color: #e0e0e0;
}
body.dark .barra {
  background: #333;
}
    
    input, button, select, textarea {
  width: 100%;
  padding: 16px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 12px;
}
    .buscar { background:#2196F3; color:white; width:100%; }
    .ok { background:#4CAF50; color:white; width:100%; }
    .no { background:#f44336; color:white; width:100%; }
    .secondary { background:#555; color:white; width:100%; }

    #adminBtn {
      position:absolute;
      top:15px;
      right:15px;
      background:none;
      font-size:20px;
    }

    #reportBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff9800;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 22px;
      display: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .alerta {
      background: #f44336 !important;
    }

    #infoEdificio {
      background:white;
      padding:10px;
      border-radius:8px;
      margin-top:10px;
      display:none;
      font-size:14px;
    }

    #listaTerritorio button {
      width:100%;
      text-align:left;
      background:white;
      margin:5px 0;
      border:1px solid #ddd;
    }

    .link {
      color:blue;
      cursor:pointer;
      text-decoration:underline;
      font-size:14px;
    }
    button {
  min-height: 55px;
  font-weight: bold;
}
    body {
  letter-spacing: 0.3px;
}
  </style>
</head>

<body>
 <button onclick="toggleDark()" 
style="
position:fixed;
top:15px;
right:15px;
width:50px;
height:50px;
border-radius:50%;
z-index:999;
background:#222;
color:white;
font-size:20px;
">
🌙
</button>
  
<div class="container">
  <div class="card-container">
  
<button id="reportBtn" onclick="abrirReporte()">🚨</button>
<button id="adminBtn" onclick="irAdmin()">🔒</button>

<h2>📍 Visitas</h2>

<input id="buildingId" placeholder="Código o dirección"
onkeypress="if(event.key==='Enter') buscar()">

<div class="link" onclick="buscarPorTerritorio()">
  Buscar por territorio
</div>

<p id="mensajeInicial">Ingresá una dirección para comenzar</p>

<button class="buscar" onclick="buscar()">Buscar</button>

<div id="infoEdificio"></div>

<div id="listaTerritorio"></div>

<h3 id="resultado"></h3>

<textarea id="nota" placeholder="Nota..." style="display:none;"></textarea>

<button id="btnOk" class="ok" onclick="marcar('ATENDIO')" style="display:none;">✔ ATENDIÓ</button>
<button id="btnNo" class="no" onclick="marcar('NO_EN_CASA')" style="display:none;">✖ NO EN CASA</button>

<button id="btnSiguiente" class="secondary" onclick="siguiente()" style="display:none;">
➡ Siguiente departamento
</button>

<button id="btnNuevoEdificio" class="secondary" onclick="crearEdificio()" style="display:none;">
➕ Agregar edificio
</button>

<script>
let currentDept = null;
let currentBuildingId = null;
function irAdmin() {
  window.location.href = "/admin.html";
}

// 🔍 BUSCAR
async function buscar() {

  limpiarVista();

  const input = normalizarDireccion(buildingId.value);
  if (!input) return;

  mensajeInicial.style.display = "none";

  const b = await fetch(`/building/${encodeURIComponent(input)}`);
  const building = await b.json();

  if (!building._id) {
    resultado.innerText = "Edificio no encontrado";
    btnNuevoEdificio.style.display = "block";
    return;
  }

  currentBuildingId = building._id;

  await cargarDepto();
}

// 🗺 TERRITORIO
async function buscarPorTerritorio() {

  limpiarVista();

  const territorio = prompt("Número de territorio:");
  if (!territorio) return;

  const res = await fetch(`/territory/${territorio}`);
  const data = await res.json();

  if (!data.length) {
    listaTerritorio.innerHTML = "No hay edificios";
    return;
  }

  data.forEach(b => {
    const btn = document.createElement("button");
    btn.innerText = b.address;
    btn.onclick = () => {
      currentBuildingId = b._id;
      cargarDepto();
    };
    listaTerritorio.appendChild(btn);
  });
}

// 🏢 CARGAR DEPTO
async function cargarDepto() {

  const res = await fetch(`/next/${currentBuildingId}`);
  const data = await res.json();

  if (data.message === "NO_AVAILABLE") {
    resultado.innerText = "No hay departamentos disponibles";
    return;
  }

  currentDept = data.dept;

  resultado.innerText = "Depto: " + data.dept.number;

  nota.style.display = "block";
  btnOk.style.display = "block";
  btnNo.style.display = "block";
  reportBtn.style.display = "block";

  await mostrarInfoEdificio();
}

// 🧾 INFO EDIFICIO + COLOR INTELIGENTE
async function mostrarInfoEdificio() {

  const res = await fetch(`/building-info/${currentBuildingId}`);
  const data = await res.json();

  infoEdificio.style.display = "block";

  infoEdificio.innerHTML = `
    <b>${data.building.address}</b><br>
    ${data.building.address2 || ""}<br>
    ${data.building.name || ""}<br>
    🕒 Última visita: ${
      data.lastVisit
        ? new Date(data.lastVisit.date).toLocaleDateString()
        : "Nunca"
    }<br>
    ${
      data.issue
        ? `⚠ ${data.issue.description || data.issue.type}`
        : ""
    }
  `;

  // 🔥 COLOR DINÁMICO DEL BOTÓN
  if (data.issue) {
    reportBtn.classList.add("alerta"); // rojo
  } else {
    reportBtn.classList.remove("alerta"); // naranja normal
  }
}

// ✔ MARCAR
async function marcar(status) {

  if (!currentDept) return;

  await fetch("/visit", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      departmentId: currentDept._id,
      status,
      note: nota.value
    })
  });

  btnSiguiente.style.display = "block";
}

// ➡ SIGUIENTE
async function siguiente() {
  nota.value = "";
  await cargarDepto();
}

// ⚠ REPORTES
function abrirReporte() {
  modalReporte.style.display = "flex";
}

function cerrarReporte() {
  modalReporte.style.display = "none";
}

async function enviarReporte() {

  await fetch("/issues", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      buildingId: currentBuildingId,
      departmentId: currentDept?._id,
      type: tipoProblema.value,
      description: descProblema.value
    })
  });

  cerrarReporte();
}

// ➕ CREAR EDIFICIO
function crearEdificio() {
  const dir = buildingId.value.trim();

  if (!dir) return;

  window.location.href = `/admin.html?crear=${encodeURIComponent(dir)}`;
}

function normalizarDireccion(dir) {

  return dir
    .toLowerCase()

    // quitar tildes
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")

    // reemplazos comunes
    .replace(/\bav\b|\bav\.\b/g, "avenida")
    .replace(/\bgral\b/g, "general")
    .replace(/\bdr\b|\bdr\.\b/g, "doctor")

    // eliminar símbolos
    .replace(/[^a-z0-9 ]/g, "")

    // espacios dobles
    .replace(/\s+/g, " ")
    .trim();
}

// 🧹 LIMPIAR
function limpiarVista() {
  listaTerritorio.innerHTML = "";
  resultado.innerText = "";
  infoEdificio.style.display = "none";

  nota.style.display = "none";
  btnOk.style.display = "none";
  btnNo.style.display = "none";
  btnSiguiente.style.display = "none";
  btnNuevoEdificio.style.display = "none";
  reportBtn.style.display = "none";
}

  window.addEventListener("load", async () => {

  const params = new URLSearchParams(window.location.search);
  const buildingIdParam = params.get("building");

  if (buildingIdParam) {

    currentBuildingId = buildingIdParam;

    mensajeInicial.style.display = "none";

    await cargarDepto();
  }

});

  function toggleDark() {

  document.body.classList.toggle("dark");

  // guardar preferencia
  if (document.body.classList.contains("dark")) {
    localStorage.setItem("modo", "dark");
  } else {
    localStorage.setItem("modo", "light");
  }
}

// cargar modo al iniciar
window.addEventListener("load", () => {
  const modo = localStorage.getItem("modo");
  if (modo === "dark") {
    document.body.classList.add("dark");
  }
});
</script>

<!-- MODAL REPORTE -->
<div id="modalReporte" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;">
  <div style="background:white;padding:20px;border-radius:10px;width:90%;max-width:400px;">
    <h3>⚠ Reportar problema</h3>
    <select id="tipoProblema">
      <option value="ERROR_DATO">Dato incorrecto</option>
      <option value="ACCESO">Problema de acceso</option>
      <option value="OTRO">Otro</option>
    </select>
    <textarea id="descProblema"></textarea>
    <button onclick="enviarReporte()" class="ok">Enviar</button>
    <button onclick="cerrarReporte()" class="secondary">Cancelar</button>
  </div>
</div>

  </div>
</div>
</body>
</html>
